<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin вЂ” CT25 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c18;--surface:#0f1628;--surface2:#162035;--border:#1e2d4a;--gold:#f0a500;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--radius:10px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--gold);letter-spacing:2px;}
  .header-links{display:flex;gap:1rem;align-items:center;}
  .header-links a{color:var(--muted);text-decoration:none;font-size:.82rem;padding:6px 14px;border:1px solid var(--border);border-radius:6px;transition:all .2s;}
  .header-links a:hover{color:var(--gold);border-color:var(--gold);}
  main{max-width:1000px;margin:2rem auto;padding:0 2rem;}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:1.5rem;color:var(--text);}
  .sync-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem;margin-bottom:2rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;}
  .sync-text{font-size:.85rem;color:var(--muted);}
  .sync-text strong{color:var(--text);}
  .tabs{display:flex;gap:4px;margin-bottom:1.5rem;border-bottom:1px solid var(--border);}
  .tab{padding:12px 20px;font-size:.82rem;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .panel{display:none;}
  .panel.active{display:block;}
  .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.2rem;}
  .form-grid.cols3{grid-template-columns:1fr 1fr 1fr;}
  @media(max-width:600px){.form-grid,.form-grid.cols3{grid-template-columns:1fr;}}
  .field{display:flex;flex-direction:column;gap:5px;}
  label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
  input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.85rem;transition:border-color .2s;width:100%;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
  .full{grid-column:1/-1;}
  .btn{background:var(--gold);color:#000;border:none;padding:11px 28px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;transition:background .2s;}
  .btn:hover{background:#ffc94a;}
  .btn-outline{background:transparent;color:var(--gold);border:1px solid var(--gold);}
  .btn-outline:hover{background:rgba(240,165,0,.1);}
  .btn-red{background:var(--red);color:#fff;}
  .btn-red:hover{background:#dc2626;}
  .toast{position:fixed;bottom:2rem;right:2rem;background:var(--green);color:#000;padding:12px 20px;border-radius:8px;font-weight:600;font-size:.85rem;transform:translateY(100px);transition:transform .3s;z-index:999;}
  .toast.show{transform:translateY(0);}
  .toast.error{background:var(--red);color:#fff;}
  .section-label{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1.5px;color:var(--muted);margin-bottom:.8rem;}
  .divider{height:1px;background:var(--border);margin:1.5rem 0;}
</style>
</head>
<body>

<header>
  <div class="logo">вљ™ Admin Panel В· CT25</div>
  <div class="header-links">
    <a href="/">в†ђ Dashboard</a>
    <a href="/logout" style="color:var(--red);border-color:var(--red)">Logout</a>
  </div>
</header>

<main>
  <div class="page-title">Admin Control Panel</div>

  <!-- SYNC BAR -->
  <div class="sync-bar">
    <div class="sync-text"><strong>CricketData.org API</strong> вЂ” Sync match list from live series data</div>
    <div style="display:flex;gap:.8rem;flex-wrap:wrap">
      <button class="btn btn-outline" onclick="syncFromAPI()">рџ”„ Sync Matches from API</button>
      <button class="btn btn-outline" onclick="clearCache()">рџ—‘ Clear API Cache</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="match">Add Match</div>
    <div class="tab" data-tab="team">Add / Update Team</div>
    <div class="tab" data-tab="player">Add / Update Player</div>
    <div class="tab" data-tab="stats">Update Player Stats</div>
  </div>

  <!-- ADD MATCH -->
  <div class="panel active" id="tab-match">
    <div class="form-card">
      <div class="section-label">Match Details</div>
      <div class="form-grid">
        <div class="field"><label>Match ID</label><input id="mId" placeholder="CT25_M16"></div>
        <div class="field"><label>Stage</label>
          <select id="mStage">
            <option>Group Stage</option>
            <option>Semi Final</option>
            <option>Final</option>
          </select>
        </div>
        <div class="field"><label>Date</label><input id="mDate" type="date"></div>
        <div class="field"><label>Stadium</label>
          <select id="mStadium">
            <option value="">вЂ” Optional вЂ”</option>
            <option>National Stadium Karachi</option>
            <option>Gaddafi Stadium</option>
            <option>Rawalpindi Cricket Stadium</option>
            <option>Dubai International Stadium</option>
          </select>
        </div>
      </div>
      <div class="section-label">Teams</div>
      <div class="form-grid cols3">
        <div class="field"><label>Team 1</label><input id="mT1" placeholder="India"></div>
        <div class="field"><label>Team 2</label><input id="mT2" placeholder="Pakistan"></div>
      </div>
      <div class="divider"></div>
      <div class="section-label">Result (fill after match)</div>
      <div class="form-grid cols3">
        <div class="field"><label>Winner</label><input id="mWinner" placeholder="India"></div>
        <div class="field"><label>Loser</label><input id="mLoser" placeholder="Pakistan"></div>
        <div class="field"><label>Win Margin</label><input id="mMargin" placeholder="6 wickets"></div>
        <div class="field"><label>Toss Winner</label><input id="mToss" placeholder="India"></div>
        <div class="field"><label>Toss Decision</label>
          <select id="mTossDec"><option value="">вЂ”</option><option>Bat</option><option>Field</option></select>
        </div>
        <div class="field"><label>Man of the Match</label><input id="mMom" placeholder="Virat Kohli"></div>
      </div>
      <button class="btn" onclick="addMatch()">Add Match</button>
    </div>
  </div>

  <!-- ADD TEAM -->
  <div class="panel" id="tab-team">
    <div class="form-card">
      <div class="form-grid">
        <div class="field"><label>Team ID</label><input id="tId" placeholder="IND"></div>
        <div class="field"><label>Team Name</label><input id="tName" placeholder="India"></div>
        <div class="field"><label>Country Name</label><input id="tCountry" placeholder="India"></div>
        <div class="field"><label>ICC Rank</label><input id="tRank" type="number" placeholder="1"></div>
        <div class="field"><label>Group</label>
          <select id="tGroup"><option value="A">Group A</option><option value="B">Group B</option></select>
        </div>
      </div>
      <button class="btn" onclick="addTeam()">Save Team</button>
    </div>
  </div>

  <!-- ADD PLAYER -->
  <div class="panel" id="tab-player">
    <div class="form-card">
      <div class="form-grid cols3">
        <div class="field"><label>Player ID</label><input id="pId" placeholder="IND09"></div>
        <div class="field"><label>Player Name</label><input id="pName" placeholder="Rohit Sharma"></div>
        <div class="field"><label>Team</label>
          <select id="pTeam">
            <option value="IND">рџ‡®рџ‡і India</option>
            <option value="PAK">рџ‡µрџ‡° Pakistan</option>
            <option value="AUS">рџ‡¦рџ‡є Australia</option>
            <option value="ENG">рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї England</option>
            <option value="NZ">рџ‡ірџ‡ї New Zealand</option>
            <option value="SA">рџ‡їрџ‡¦ South Africa</option>
            <option value="BAN">рџ‡§рџ‡© Bangladesh</option>
            <option value="AFG">рџ‡¦рџ‡« Afghanistan</option>
          </select>
        </div>
        <div class="field"><label>Bowling Style</label><input id="pRole" placeholder="Right Arm Fast"></div>
        <div class="field"><label>Total Runs</label><input id="pRuns" type="number" value="0"></div>
        <div class="field"><label>Wickets</label><input id="pWkts" type="number" value="0"></div>
        <div class="field"><label>Batting Avg</label><input id="pAvg" type="number" step="0.01" value="0"></div>
        <div class="field"><label>Strike Rate</label><input id="pSR" type="number" step="0.01" value="0"></div>
        <div class="field"><label>Economy</label><input id="pEco" type="number" step="0.01" value="0"></div>
      </div>
      <button class="btn" onclick="addPlayer()">Save Player</button>
    </div>
  </div>

  <!-- UPDATE STATS -->
  <div class="panel" id="tab-stats">
    <div class="form-card">
      <div class="section-label">Quick stat update by Player ID</div>
      <div class="form-grid cols3">
        <div class="field"><label>Player ID</label><input id="sId" placeholder="IND02"></div>
        <div class="field"><label>Total Runs</label><input id="sRuns" type="number" value="0"></div>
        <div class="field"><label>Wickets</label><input id="sWkts" type="number" value="0"></div>
        <div class="field"><label>Batting Avg</label><input id="sAvg" type="number" step="0.01" value="0"></div>
        <div class="field"><label>Strike Rate</label><input id="sSR" type="number" step="0.01" value="0"></div>
        <div class="field"><label>Economy</label><input id="sEco" type="number" step="0.01" value="0"></div>
      </div>
      <button class="btn" onclick="updateStats()">Update Stats</button>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => el.classList.remove('show'), 3000);
}

async function post(url, data) {
  const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
  return r.json();
}

async function syncFromAPI() {
  toast('Syncing from API...');
  const res = await post('/api/sync', {});
  if (res.error) toast(res.error, true);
  else toast(`вњ“ Synced ${res.synced_matches} matches`);
}

async function clearCache() {
  // Just a UI thing вЂ” cache expires automatically
  toast('Cache will expire naturally (5вЂ“60 min TTL)');
}

async function addMatch() {
  const res = await post('/api/add_match', {
    match_id: document.getElementById('mId').value,
    match_stage: document.getElementById('mStage').value,
    match_date: document.getElementById('mDate').value,
    stadium: document.getElementById('mStadium').value,
    team_1: document.getElementById('mT1').value,
    team_2: document.getElementById('mT2').value,
    winner: document.getElementById('mWinner').value || null,
    loser: document.getElementById('mLoser').value || null,
    margin: document.getElementById('mMargin').value || null,
    toss_winner: document.getElementById('mToss').value || null,
    toss_decision: document.getElementById('mTossDec').value || null,
    mom: document.getElementById('mMom').value || null,
  });
  if (res.error) toast(res.error, true);
  else toast('вњ“ Match saved');
}

async function addTeam() {
  const res = await post('/api/add_team', {
    team_id: document.getElementById('tId').value,
    team_name: document.getElementById('tName').value,
    country_name: document.getElementById('tCountry').value,
    team_rank: document.getElementById('tRank').value,
    group_name: document.getElementById('tGroup').value,
  });
  if (res.error) toast(res.error, true);
  else toast('вњ“ Team saved');
}

async function addPlayer() {
  const res = await post('/api/add_player', {
    player_id: document.getElementById('pId').value,
    player_name: document.getElementById('pName').value,
    team_id: document.getElementById('pTeam').value,
    role: document.getElementById('pRole').value,
    runs: document.getElementById('pRuns').value,
    wickets: document.getElementById('pWkts').value,
    bat_avg: document.getElementById('pAvg').value,
    sr: document.getElementById('pSR').value,
    economy: document.getElementById('pEco').value,
  });
  if (res.error) toast(res.error, true);
  else toast('вњ“ Player saved');
}

async function updateStats() {
  const res = await post('/api/update_player', {
    player_id: document.getElementById('sId').value,
    runs: document.getElementById('sRuns').value,
    wickets: document.getElementById('sWkts').value,
    bat_avg: document.getElementById('sAvg').value,
    sr: document.getElementById('sSR').value,
    economy: document.getElementById('sEco').value,
  });
  if (res.error) toast(res.error, true);
  else toast('вњ“ Stats updated');
}
</script>
</body>
</html>
