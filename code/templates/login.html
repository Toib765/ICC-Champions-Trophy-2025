<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — CT25</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c18;--surface:#0f1628;--border:#1e2d4a;--gold:#f0a500;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.5rem;width:100%;max-width:380px;}
  .icon{text-align:center;font-size:2.5rem;margin-bottom:.5rem;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;text-align:center;color:var(--gold);margin-bottom:.3rem;}
  .sub{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:2rem;}
  label{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
  input{width:100%;background:#162035;border:1px solid var(--border);color:var(--text);padding:12px 14px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.9rem;margin-bottom:1.2rem;transition:border-color .2s;}
  input:focus{outline:none;border-color:var(--gold);}
  button{width:100%;background:var(--gold);color:#000;border:none;padding:13px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:background .2s;}
  button:hover{background:#ffc94a;}
  .err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);padding:10px 14px;border-radius:8px;font-size:.83rem;margin-bottom:1.2rem;}
  .back{display:block;text-align:center;margin-top:1.2rem;font-size:.8rem;color:var(--muted);text-decoration:none;}
  .back:hover{color:var(--text);}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⚙</div>
  <h1>Admin Login</h1>
  <div class="sub">ICC Champions Trophy 2025 Dashboard</div>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Username</label>
    <input name="username" type="text" placeholder="toib" autocomplete="username">
    <label>Password</label>
    <input name="password" type="password" placeholder="••••••" autocomplete="current-password">
    <button type="submit">Login</button>
  </form>
  <a href="/" class="back">← Back to Dashboard</a>
</div>
</body>
</html>
